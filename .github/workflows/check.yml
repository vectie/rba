name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  stable-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu-latest
            path: ubuntu_x86_64_moon_setup

    runs-on: ${{ matrix.os.name }}
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH


      - name: moon version
        run: |
          cd rabbita
          moon version --all
          moonrun --version

      - name: moon update
        run: |
          moon update

      # - name: moon test
      #   run: |
      #     cd rabbita
      #     moon test --target js --serial --release
      #     moon test --target js --serial

      - name: moon check
        run: |
          cd rabbita
          moon check --target js --deny-warn

      - name: moon info
        run: |
          cd rabbita
          moon info --target js
          git diff --exit-code

      - name: format diff
        run: |
          cd rabbita
          moon fmt
          git diff --exit-code

  typo-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_COLOR: 1
      TYPOS_VERSION: v1.19.0
    steps:
      - name: download typos
        run: curl -LsSf https://github.com/crate-ci/typos/releases/download/$TYPOS_VERSION/typos-$TYPOS_VERSION-x86_64-unknown-linux-musl.tar.gz | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: check typos
        run: typos

  vite-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: MoonBit version
        run: |
          moon version --all
          moonrun --version

      - name: Install plugin dependencies
        working-directory: vite-plugin
        run: npm install

      - name: Test Vite plugin
        working-directory: vite-plugin
        run: npm test
