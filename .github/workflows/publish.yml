name: publish-package
run-name: publish Rabbita ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "rabbita-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example rabbita-v0.12.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-rabbita-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
      TYPOS_VERSION: v1.19.0

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Resolve release version
        id: release
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$GITHUB_REF_NAME"
          fi

          case "$tag" in
            rabbita-v*) version="${tag#rabbita-v}" ;;
            *)
              echo "Release tag must use the rabbita-v* format, got: $tag" >&2
              exit 1
              ;;
          esac

          manifest_version="$(awk -F'"' '/^version = / { print $2; exit }' rabbita/moon.mod)"
          if [ "$version" != "$manifest_version" ]; then
            echo "Tag version $version does not match rabbita/moon.mod version $manifest_version" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit version
        run: |
          moon version --all
          moonrun --version

      - name: Update dependencies
        run: moon update

      - name: Check package
        working-directory: rabbita
        run: moon check --target all --deny-warn

      - name: Check generated interfaces
        working-directory: rabbita
        run: |
          moon info --target js
          git diff --exit-code

      - name: Check formatting
        working-directory: rabbita
        run: moon fmt --check

      - name: Download typos
        run: curl -LsSf https://github.com/crate-ci/typos/releases/download/$TYPOS_VERSION/typos-$TYPOS_VERSION-x86_64-unknown-linux-musl.tar.gz | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"

      - name: Check typos
        run: typos

      - name: Publish to Mooncakes
        working-directory: rabbita
        run: |
          mkdir -p "$HOME/.moon"
          printf '%s' "$SECRET" > "$HOME/.moon/credentials.json"
          trap 'rm -f "$HOME/.moon/credentials.json"' EXIT
          moon publish
        env:
          SECRET: ${{ secrets.MOONCAKES_MOONBIT_COMMUNITY_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "Rabbita ${{ steps.release.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
